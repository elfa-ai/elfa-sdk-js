name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 2.0.1)"
        required: true
        type: string

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: |
          npm run typecheck
          npm run lint
          npm test
          npm run build

      - name: Validate version
        if: github.event.inputs.version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ "$PACKAGE_VERSION" != "$INPUT_VERSION" ]; then
            echo "❌ Version mismatch: package.json has $PACKAGE_VERSION but input is $INPUT_VERSION"
            exit 1
          fi
          echo "✅ Version validation passed"

  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    # Trusted publishing (OIDC) — no long-lived NPM_TOKEN. npm mints a
    # short-lived credential from the id-token, and the trust relationship is
    # configured on npmjs.com against this repo, this workflow filename and the
    # `production` environment above. Changing any of those three breaks
    # publishing until the npm-side config is updated to match.
    permissions:
      id-token: write # required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1. Node 20
      # ships npm 10.x, which does not understand OIDC publishing. This only
      # sets the runner's toolchain — the package still targets node >= 18 per
      # `engines`, and the build output is unaffected.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      # No NODE_AUTH_TOKEN: npm detects the OIDC credential itself. Provenance
      # attestations are generated automatically under trusted publishing, so
      # --provenance is not needed.
      - name: Publish to NPM
        run: |
          npm publish --access public

          echo "✅ Package published successfully"

      - name: Get package info
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need full history for changelog

      - name: Get package info
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: changelog
        env:
          VERSION: ${{ steps.package.outputs.version }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: |
          set -euo pipefail

          # Prefer the curated CHANGELOG.md entry for this version — that is what
          # readers actually need on a release, especially the breaking changes.
          # Pull out everything between "## <version>" and the next "## " heading.
          # The version is escaped first so its dots are not treated as regex
          # wildcards (3.0.0 must not match 3x0y0).
          awk -v ver="$VERSION" '
            BEGIN { gsub(/\./, "\\.", ver) }
            $0 ~ "^## +" ver "([[:space:]]|$)" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > section.md || true

          # Trim leading and trailing blank lines from the extracted section.
          sed -i -e '/./,$!d' section.md
          sed -i -e :a -e '/^\n*$/{$d;N;ba' -e '}' section.md

          if [ -s section.md ]; then
            echo "Using CHANGELOG.md entry for $VERSION"
            {
              echo "## Changes"
              echo ""
              cat section.md
            } > RELEASE_NOTES.md
          else
            # No curated entry for this version — fall back to the commit log so a
            # release still gets notes rather than an empty body.
            echo "No CHANGELOG.md entry for $VERSION; falling back to commit log"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

            echo "## Changes" > RELEASE_NOTES.md
            if [ -n "$PREV_TAG" ]; then
              echo "" >> RELEASE_NOTES.md
              git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges >> RELEASE_NOTES.md
              echo "" >> RELEASE_NOTES.md
            else
              echo "- Initial release" >> RELEASE_NOTES.md
            fi
          fi

          {
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "npm install ${PACKAGE_NAME}@${VERSION}"
            echo '```'
          } >> RELEASE_NOTES.md

          cat RELEASE_NOTES.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: Release v${{ steps.package.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(steps.package.outputs.version, '-') }}

  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [validate, publish, create-release]
    if: success()

    steps:
      - name: Get package info
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Notify success
        run: |
          echo "🎉 Successfully released ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          echo "📦 NPM: https://www.npmjs.com/package/${{ steps.package.outputs.name }}"
          echo "🏷️ GitHub: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.package.outputs.version }}"
